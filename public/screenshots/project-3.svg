<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2519"/>
      <stop offset="100%" stop-color="#060e0a"/>
    </linearGradient>
    <pattern id="cross" width="32" height="32" patternUnits="userSpaceOnUse">
      <line x1="16" y1="0" x2="16" y2="32" stroke="#00d4a0" stroke-width="0.2" opacity="0.1"/>
      <line x1="0" y1="16" x2="32" y2="16" stroke="#00d4a0" stroke-width="0.2" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="480" fill="url(#bg3)"/>
  <rect width="800" height="480" fill="url(#cross)"/>

  <!-- Content pipeline diagram -->
  <!-- Step 1: AI Copy -->
  <circle cx="140" cy="220" r="52" fill="#0a1e14" stroke="#00d4a0" stroke-width="1" stroke-opacity="0.45"/>
  <text x="140" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4a0" opacity="0.9">AI Writes</text>
  <text x="140" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4a0" opacity="0.9">Copy</text>
  <text x="140" y="248" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d4a0" opacity="0.45">ChatGPT</text>

  <line x1="195" y1="220" x2="255" y2="220" stroke="#00d4a0" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5 4"/>
  <polygon points="255,216 263,220 255,224" fill="#00d4a0" opacity="0.5"/>

  <!-- Step 2: Design -->
  <circle cx="320" cy="220" r="52" fill="#0a1e14" stroke="#00d4a0" stroke-width="1" stroke-opacity="0.45"/>
  <text x="320" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4a0" opacity="0.9">Canva AI</text>
  <text x="320" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4a0" opacity="0.9">Designs</text>
  <text x="320" y="248" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d4a0" opacity="0.45">Auto-generate</text>

  <line x1="375" y1="220" x2="435" y2="220" stroke="#00d4a0" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5 4"/>
  <polygon points="435,216 443,220 435,224" fill="#00d4a0" opacity="0.5"/>

  <!-- Step 3: Schedule -->
  <circle cx="500" cy="220" r="52" fill="#0a1e14" stroke="#00d4a0" stroke-width="1" stroke-opacity="0.45"/>
  <text x="500" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4a0" opacity="0.9">Make.com</text>
  <text x="500" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4a0" opacity="0.9">Schedules</text>
  <text x="500" y="248" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d4a0" opacity="0.45">Multi-platform</text>

  <line x1="555" y1="220" x2="615" y2="220" stroke="#00d4a0" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="5 4"/>
  <polygon points="615,216 623,220 615,224" fill="#00d4a0" opacity="0.5"/>

  <!-- Step 4: Publish -->
  <circle cx="680" cy="220" r="52" fill="#0a1e14" stroke="#00d4a0" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="680" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4a0">Published</text>
  <text x="680" y="230" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d4a0">Everywhere</text>
  <text x="680" y="248" text-anchor="middle" font-family="monospace" font-size="8" fill="#00d4a0" opacity="0.6">Daily output</text>

  <!-- Platform icons row -->
  <text x="400" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d4a0" opacity="0.4">META · INSTAGRAM · FACEBOOK · GOOGLE · SHEETS → ANALYTICS</text>

  <!-- Metric badges -->
  <rect x="100" y="310" width="180" height="30" rx="15" fill="#00d4a0" fill-opacity="0.08" stroke="#00d4a0" stroke-width="0.8" stroke-opacity="0.35"/>
  <text x="190" y="330" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4a0" opacity="0.8">40+ hrs saved/month</text>

  <rect x="310" y="310" width="180" height="30" rx="15" fill="#00d4a0" fill-opacity="0.08" stroke="#00d4a0" stroke-width="0.8" stroke-opacity="0.35"/>
  <text x="400" y="330" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4a0" opacity="0.8">100% automated</text>

  <rect x="520" y="310" width="180" height="30" rx="15" fill="#00d4a0" fill-opacity="0.08" stroke="#00d4a0" stroke-width="0.8" stroke-opacity="0.35"/>
  <text x="610" y="330" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4a0" opacity="0.8">Daily consistent output</text>

  <text x="400" y="90" text-anchor="middle" font-family="monospace" font-size="18" fill="#00d4a0" opacity="0.8" letter-spacing="2">SOCIAL MEDIA CONTENT ENGINE</text>
  <text x="400" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d4a0" opacity="0.4">Make.com · Canva AI · Meta Business Suite · Google Workspace</text>
</svg>
